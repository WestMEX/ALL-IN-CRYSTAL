<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All-In Crystal – Registro de Escaneos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050508;
      --surface: #0f0f18;
      --border: #1e1e30;
      --gold: #d4a853;
      --gold2: #f0c96a;
      --green: #3dffa0;
      --red: #ff4f4f;
      --text: #e8e8f0;
      --muted: #6b6b88;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,168,83,.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .container { max-width: 560px; margin: 0 auto; position: relative; }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .25rem;
    }
    .sub {
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .count {
      font-size: .8rem;
      color: var(--muted);
    }
    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .4rem .9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .78rem;
      font-family: 'DM Sans', sans-serif;
      transition: .2s;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .9rem;
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    .log-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: .7rem;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .log-dot.ok   { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .log-dot.fail { background: var(--red);   box-shadow: 0 0 8px var(--red); }

    .log-id   { font-weight: 700; font-size: .9rem; color: var(--text); }
    .log-time { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

    .log-result {
      font-size: .75rem;
      font-weight: 700;
      padding: .25rem .6rem;
      border-radius: 6px;
      white-space: nowrap;
    }
    .log-result.ok   { background: rgba(61,255,160,.12); color: var(--green); }
    .log-result.fail { background: rgba(255,79,79,.12);  color: var(--red); }

    .refresh-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .74rem;
      color: var(--muted);
    }
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      font-size: .78rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed var(--border);
    }
    .back-link:hover { color: var(--gold); }

    /* badge de "nuevo escaneo" */
    .new-badge {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #050508;
      font-weight: 700;
      font-size: .85rem;
      padding: .6rem 1.4rem;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(61,255,160,.35);
      animation: popIn .3s ease;
      cursor: pointer;
      z-index: 99;
    }
    @keyframes popIn {
      from { transform: translateX(-50%) scale(.8); opacity: 0; }
      to   { transform: translateX(-50%) scale(1);  opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ALL-IN CRYSTAL</h1>
  <div class="sub">Registro de Escaneos NFC</div>

  <div class="toolbar">
    <div class="count" id="countEl">Cargando…</div>
    <button class="btn-clear" onclick="limpiarLog()">🗑 Limpiar log</button>
  </div>

  <div id="logContainer"></div>

  <div class="refresh-note">Esta página se actualiza automáticamente cada 5 seg.</div>
  <a class="back-link" href="index.html">← Ir a verificación</a>
</div>

<div class="new-badge" id="newBadge" onclick="ocultarBadge()">🔔 ¡Nuevo escaneo! Toca para cerrar</div>

<script>
  let ultimoConteo = -1;

  function renderLog() {
    const logs = JSON.parse(localStorage.getItem("nfc_logs") || "[]");
    const container = document.getElementById("logContainer");
    const countEl   = document.getElementById("countEl");

    if (logs.length === 0) {
      container.innerHTML = '<div class="empty">Aún no hay escaneos registrados.<br>Escanea la gorra para ver el resultado aquí.</div>';
      countEl.textContent = "0 escaneos";
      ultimoConteo = 0;
      return;
    }

    // Detecta si llegó uno nuevo
    if (ultimoConteo !== -1 && logs.length > ultimoConteo) {
      document.getElementById("newBadge").style.display = "block";
    }
    ultimoConteo = logs.length;
    countEl.textContent = `${logs.length} escaneo${logs.length !== 1 ? 's' : ''} registrado${logs.length !== 1 ? 's' : ''}`;

    container.innerHTML = logs.map(log => {
      const esOk = log.resultado.includes("ORIGINAL");
      return `
        <div class="log-item">
          <div class="log-dot ${esOk ? 'ok' : 'fail'}"></div>
          <div>
            <div class="log-id">${log.id}</div>
            <div class="log-time">${log.tiempo}</div>
          </div>
          <div class="log-result ${esOk ? 'ok' : 'fail'}">${log.resultado}</div>
        </div>
      `;
    }).join('');
  }

  function limpiarLog() {
    if (confirm("¿Borrar todos los registros de escaneos?")) {
      localStorage.removeItem("nfc_logs");
      ultimoConteo = 0;
      renderLog();
    }
  }

  function ocultarBadge() {
    document.getElementById("newBadge").style.display = "none";
  }

  // Carga inicial y refresco automático
  renderLog();
  setInterval(renderLog, 5000);
</script>

</body>
</html>
